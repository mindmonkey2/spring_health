name: Android Distribution

on:
  push:
    branches: [main]

# Only one distribution run at a time on main.
concurrency:
  group: distribute-main
  cancel-in-progress: true

jobs:
  distribute-member-apk:
    name: Member App — Build & Distribute APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring_health_member_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-member-${{ hashFiles('spring_health_member_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-member-

      - name: Install dependencies
        run: flutter pub get

      # Decode the keystore from the base64 secret and write key.properties
      - name: Set up release signing
        working-directory: spring_health_member_app/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/spring-health-release.jks
          cat > key.properties << EOF
          storeFile=spring-health-release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_MEMBER_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPRINGHEALTH }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}

      # Clean up signing files so they are never cached or persisted
      - name: Clean up signing artifacts
        if: always()
        working-directory: spring_health_member_app/android
        run: rm -f app/spring-health-release.jks key.properties
