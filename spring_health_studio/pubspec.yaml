name: spring_health_studio
description: Multi-branch gym management system with role-based access
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0

  image_picker: ^1.1.2

  # UI & State Management
  intl: ^0.20.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  vibration: ^2.0.0

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4

  # Email
  mailer: ^6.1.2

  url_launcher: ^6.3.2

  # File Sharing
  share_plus: ^10.0.2

  connectivity_plus: ^6.0.5

  fl_chart: ^0.69.0  # Beautiful, animated charts
  google_fonts: ^6.2.1  # Premium typography

  # Utilities
  uuid: ^4.5.1
  csv: ^7.1.0

  flutter_animate: any
  firebase_ai: ^3.10.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_cloud_firestore: ^4.1.0+1

flutter:
  uses-material-design: true
